<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MUSIC SERENIA</title>
<style>
  :root{
    --bg:#eaf6fd;
    --bg-soft:#ffffff;
    --blue:#2f9bd6;
    --blue-dark:#16679e;
    --gold:#ffb84d;
    --text:#12374f;
    --muted:#5b7f96;
    --line:rgba(18,55,79,0.10);
    --shadow:0 10px 30px rgba(22,103,158,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;
    min-height:100vh;padding-bottom:110px; /* room for fixed player bar */
  }

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 5vw;background:var(--bg-soft);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;gap:20px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text);}
  .logo-wrap{
    width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--bg);
    display:flex;align-items:center;justify-content:center;border:1px solid var(--line);flex-shrink:0;
  }
  .logo-wrap img{width:100%;height:100%;object-fit:cover;}
  .brand-name{font-family:Georgia,serif;font-size:1.15rem;letter-spacing:0.1em;font-weight:700;}
  .brand-name span{color:var(--blue);}

  .search-wrap{flex:1;max-width:460px;position:relative;}
  .search-wrap input{
    width:100%;padding:11px 16px 11px 40px;border-radius:999px;border:1px solid var(--line);
    background:#f6fbfe;color:var(--text);font-size:0.92rem;outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,155,214,0.15);}
  .search-wrap::before{
    content:"⌕";position:absolute;left:15px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:1.05rem;
  }
  .nav-links{display:flex;gap:14px;align-items:center;}
  .nav-link{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:600;}
  .nav-link:hover{color:var(--blue-dark);}

  main{max-width:1100px;margin:0 auto;padding:36px 5vw;}
  .page-head{margin-bottom:26px;}
  .eyebrow{
    color:var(--blue-dark);letter-spacing:0.2em;font-size:0.72rem;font-weight:700;
    text-transform:uppercase;background:#dff1fb;display:inline-block;
    padding:5px 12px;border-radius:999px;margin-bottom:12px;
  }
  .page-head h1{font-family:Georgia,serif;font-size:1.9rem;}
  .result-count{color:var(--muted);font-size:0.85rem;margin-top:6px;}

  .song-grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:20px;
  }
  .song-card{
    background:var(--bg-soft);border:1px solid var(--line);border-radius:16px;
    padding:16px;box-shadow:var(--shadow);cursor:pointer;
    transition:transform .12s ease, border-color .12s ease;
    display:flex;flex-direction:column;
  }
  .song-card:hover{transform:translateY(-3px);border-color:var(--blue);}
  .song-card.playing{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,155,214,0.18);}
  .song-cover{
    width:100%;aspect-ratio:1/1;border-radius:12px;margin-bottom:12px;
    background:linear-gradient(135deg,var(--blue),var(--gold));background-size:cover;background-position:center;
    position:relative;overflow:hidden;
  }
  .song-cover .play-overlay{
    position:absolute;inset:0;background:rgba(18,55,79,0.35);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.8rem;
    opacity:0;transition:opacity .15s ease;
  }
  .song-card:hover .play-overlay{opacity:1;}
  .song-name{font-weight:700;font-size:0.95rem;margin-bottom:4px;}
  .song-desc{color:var(--muted);font-size:0.8rem;line-height:1.4;flex:1;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px;}
  .song-actions{display:flex;gap:8px;}
  .icon-btn{
    background:#f6fbfe;border:1px solid var(--line);border-radius:8px;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--blue-dark);font-size:0.95rem;text-decoration:none;flex-shrink:0;
  }
  .icon-btn:hover{background:#dff1fb;}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--muted);
    background:var(--bg-soft);border:1px solid var(--line);border-radius:16px;
  }

  /* ---------- Fixed player bar ---------- */
  #playerBar{
    position:fixed;bottom:0;left:0;right:0;background:var(--bg-soft);
    border-top:1px solid var(--line);box-shadow:0 -6px 24px rgba(22,103,158,0.12);
    padding:14px 5vw;display:none;align-items:center;gap:20px;z-index:30;flex-wrap:wrap;
  }
  #playerBar.active{display:flex;}
  .now-playing{display:flex;align-items:center;gap:12px;min-width:200px;flex:1;}
  .now-cover{
    width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--gold));
    background-size:cover;background-position:center;flex-shrink:0;
  }
  .now-info{overflow:hidden;}
  .now-title{font-weight:700;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .now-desc{color:var(--muted);font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}

  .player-center{display:flex;flex-direction:column;align-items:center;gap:8px;flex:2;min-width:260px;}
  .controls-row{display:flex;align-items:center;gap:18px;}
  .ctrl-btn{
    background:none;border:none;cursor:pointer;color:var(--text);font-size:1.15rem;
    display:flex;align-items:center;justify-content:center;
  }
  .ctrl-btn.play-pause{
    background:var(--blue);color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.1rem;
    box-shadow:0 6px 14px rgba(47,155,214,0.35);
  }
  .seek-row{display:flex;align-items:center;gap:10px;width:100%;max-width:420px;}
  .time-label{font-size:0.72rem;color:var(--muted);min-width:34px;text-align:center;}
  input[type="range"]{
    -webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;
    background:var(--line);outline:none;cursor:pointer;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--blue);cursor:pointer;
  }
  .player-right{display:flex;align-items:center;gap:14px;min-width:150px;justify-content:flex-end;}
  .volume-row{display:flex;align-items:center;gap:6px;}
  .volume-row input[type="range"]{width:80px;}

  @media(max-width:800px){
    header{padding:16px 4vw;}
    .search-wrap{order:3;max-width:100%;flex-basis:100%;}
    #playerBar{padding:12px 4vw;}
    .player-right{display:none;}
  }
</style>
</head>
<body>

<header>
  <a href="landing.html" class="brand">
    <div class="logo-wrap"><img src="logo.png" alt="Music Serenia logo" onerror="this.style.display='none'"></div>
    <div class="brand-name">MUSIC <span>SERENIA</span></div>
  </a>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search songs, artists, moods...">
  </div>
  <div class="nav-links">
    <a href="landing.html" class="nav-link">Home</a>
    <a href="register.html" class="nav-link">Log Out</a>
  </div>
</header>

<main>
  <div class="page-head">
    <div class="eyebrow">Your Library</div>
    <h1>Browse & Play</h1>
    <div class="result-count" id="resultCount">Loading songs...</div>
  </div>

  <div class="song-grid" id="songGrid"></div>
</main>

<!-- Fixed bottom player -->
<div id="playerBar">
  <div class="now-playing">
    <div class="now-cover" id="nowCover"></div>
    <div class="now-info">
      <div class="now-title" id="nowTitle">—</div>
      <div class="now-desc" id="nowDesc">—</div>
    </div>
  </div>

  <div class="player-center">
    <div class="controls-row">
      <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" title="Play/Pause">▶</button>
      <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
    </div>
    <div class="seek-row">
      <span class="time-label" id="currentTime">0:00</span>
      <input type="range" id="seekBar" value="0" min="0" max="100" step="0.1">
      <span class="time-label" id="durationTime">0:00</span>
    </div>
  </div>

  <div class="player-right">
    <a class="icon-btn" id="downloadBtn" title="Download" download>⬇</a>
    <div class="volume-row">
      <span style="color:var(--muted);font-size:0.9rem;">🔊</span>
      <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
    </div>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script>
let ALL_SONGS = [];
let FILTERED_SONGS = [];
let CURRENT_INDEX = -1;

const audio = document.getElementById('audioPlayer');
const playerBar = document.getElementById('playerBar');
const playPauseBtn = document.getElementById('playPauseBtn');
const seekBar = document.getElementById('seekBar');
const currentTimeEl = document.getElementById('currentTime');
const durationTimeEl = document.getElementById('durationTime');
const volumeBar = document.getElementById('volumeBar');
const downloadBtn = document.getElementById('downloadBtn');
const nowCover = document.getElementById('nowCover');
const nowTitle = document.getElementById('nowTitle');
const nowDesc = document.getElementById('nowDesc');

// ---------- Load songs ----------
async function loadSongs(){
  const grid = document.getElementById('songGrid');
  const countEl = document.getElementById('resultCount');
  try{
    const res = await fetch('/api/songs');
    const data = await res.json();
    ALL_SONGS = data.songs || [];
    applyFilter();
  } catch(err){
    countEl.textContent = 'Could not load songs from the server.';
    grid.innerHTML = '<div class="empty-state">Could not reach the server. Make sure app.py is running.</div>';
  }
}

function applyFilter(){
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  FILTERED_SONGS = ALL_SONGS.filter(song =>
    song.name.toLowerCase().includes(query) ||
    (song.description || '').toLowerCase().includes(query)
  );
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('songGrid');
  const countEl = document.getElementById('resultCount');
  countEl.textContent = FILTERED_SONGS.length + ' song' + (FILTERED_SONGS.length === 1 ? '' : 's') + ' found';

  if(FILTERED_SONGS.length === 0){
    grid.innerHTML = '<div class="empty-state">No songs match your search yet. Try a different keyword, or check back after the admin uploads more music.</div>';
    return;
  }

  grid.innerHTML = '';
  FILTERED_SONGS.forEach((song, index) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    if (isCurrentlyPlaying(song)) card.classList.add('playing');

    const coverStyle = song.cover_filename ? `background-image:url('${song.cover_filename}')` : '';
    card.innerHTML = `
      <div class="song-cover" style="${coverStyle}">
        <div class="play-overlay">▶</div>
      </div>
      <div class="song-name">${escapeHtml(song.name)}</div>
      <div class="song-desc">${escapeHtml(song.description || 'No description')}</div>
      <div class="song-actions">
        <a class="icon-btn" href="${song.audio_filename}" download title="Download">⬇</a>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.closest('.icon-btn')) return; // let download link work independently
      playSongAt(index);
    });
    grid.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function isCurrentlyPlaying(song){
  return CURRENT_INDEX >= 0 && FILTERED_SONGS[CURRENT_INDEX] && FILTERED_SONGS[CURRENT_INDEX].id === song.id;
}

document.getElementById('searchInput').addEventListener('input', applyFilter);

// ---------- Player logic ----------
function playSongAt(index){
  if(index < 0 || index >= FILTERED_SONGS.length) return;
  CURRENT_INDEX = index;
  const song = FILTERED_SONGS[index];

  audio.src = song.audio_filename;
  audio.play();

  nowTitle.textContent = song.name;
  nowDesc.textContent = song.description || 'No description';
  nowCover.style.backgroundImage = song.cover_filename ? `url('${song.cover_filename}')` : 'none';
  downloadBtn.href = song.audio_filename;
  downloadBtn.setAttribute('download', song.audio_filename);

  playerBar.classList.add('active');
  renderGrid();
}

playPauseBtn.addEventListener('click', () => {
  if(CURRENT_INDEX === -1){
    if(FILTERED_SONGS.length > 0) playSongAt(0);
    return;
  }
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
});

audio.addEventListener('play', () => { playPauseBtn.textContent = '⏸'; });
audio.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });

document.getElementById('nextBtn').addEventListener('click', () => {
  if(FILTERED_SONGS.length === 0) return;
  const next = (CURRENT_INDEX + 1) % FILTERED_SONGS.length;
  playSongAt(next);
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if(FILTERED_SONGS.length === 0) return;
  const prev = (CURRENT_INDEX - 1 + FILTERED_SONGS.length) % FILTERED_SONGS.length;
  playSongAt(prev);
});

// auto-advance when a song ends
audio.addEventListener('ended', () => {
  if(FILTERED_SONGS.length === 0) return;
  const next = (CURRENT_INDEX + 1) % FILTERED_SONGS.length;
  playSongAt(next);
});

// seek bar
audio.addEventListener('timeupdate', () => {
  if(!isNaN(audio.duration)){
    seekBar.max = audio.duration;
    seekBar.value = audio.currentTime;
    currentTimeEl.textContent = formatTime(audio.currentTime);
    durationTimeEl.textContent = formatTime(audio.duration);
  }
});
seekBar.addEventListener('input', () => {
  audio.currentTime = seekBar.value;
});

// volume
volumeBar.addEventListener('input', () => {
  audio.volume = volumeBar.value;
});

function formatTime(seconds){
  if(isNaN(seconds)) return '0:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

loadSongs();
</script>

</body>
</html>
